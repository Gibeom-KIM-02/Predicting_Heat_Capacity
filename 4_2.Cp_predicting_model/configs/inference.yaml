# configs/inference.yaml

model_dir: models/final_model
output_dir: output/prediction_examples
feature_set: selected_rdkit_v1

smiles_columns:
  - canonical_smiles
  - smiles
  - SMILES

name_columns:
  - chemical_compound_name
  - compound_name
  - name

target_columns:
  - Cp [J/mol*K]
  - Cp_J_molK
  - heat_capacity
  - Cp

name_resolution:
  use_local_lookup: true
  local_lookup_files:
    - data/processed/Cp_input_data_final.xlsx
  sheet_name: null
  allow_pubchem_fallback: true
  # manual_map_file: data/external/name_smiles_manual_map.csv