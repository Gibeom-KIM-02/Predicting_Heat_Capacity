data_file: ./mid_project_verified.xlsx
sheet_name: Sheet1
output_dir: FEATURE_SELECTION_RESULTS

smiles_col: smiles
name_col: name
target_col: heat_capacity
group_col: group

skip_unit_row: true
auto_drop_unit_row: true

candidate_features:
  - molecular_weight
  - rotatable_bonds
  - H_bond_donors
  - H_bond_acceptors
  - TPSA
  - logP
  - melting_point
  - boiling_point

models:
  - linear
  - ridge
  - elasticnet
  - svr
  - rf
  - gbr

min_non_null_ratio: 0.7
min_pair_rows: 30
low_variance_threshold: 0.0
iqr_outlier_threshold: 0.0
redundancy_corr_threshold: 0.85

use_information_gain: true
target_bins: 3
feature_bins: 4

cv_splits: 5
cv_repeats: 10
test_size: 0.2
seed: 2357
top_k_pairs: 10

save_plots: true
top_n_plot: 15
save_distribution_plots: true
save_violin_plot: true
save_correlation_heatmap: true
save_ig_plots: true
save_holdout_plots: true

no_shap: false
save_shap_beeswarm: true
save_shap_dependence: true
